<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Visualization App</title>
    <link rel="stylesheet" href="style.css">
    <script src="equation.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <div id="app-container">
        <div id="input-container">
            <label for="input-equation">Equation:</label>
            <input type="text" id="input-equation" placeholder="e.g., x = a^2 + 2(b+c)">
        </div>
        <div id="visualization-container">
            <p>Tree Diagram will be displayed here</p>
            <!-- Visualization sandbox area -->
        </div>
        <div id="output-container">
            <label for="output-equation">New Equation:</label>
            <input type="text" id="output-equation" readonly>
        </div>
    </div>
</body>
</html>
